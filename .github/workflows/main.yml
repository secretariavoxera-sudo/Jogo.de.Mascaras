name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build:static

      - name: Prepare Pages Artifact
        run: |
          mkdir -p public_deploy
          # Copiar ficheiros gerados pelo build (Vite está configurado para colocar na raiz)
          # Usamos caminhos relativos ao diretório de trabalho (raiz do repo)
          for f in index.html manifest.json sw.js icon-192.png icon-512.png favicon-32.png; do
            if [ -f "$f" ]; then
              cp "$f" public_deploy/
              echo "Copiado $f"
            else
              echo "Aviso: $f não encontrado na raiz"
            fi
          done

          if [ -d "assets" ]; then
            cp -r assets public_deploy/
            echo "Diretório assets copiado"
          fi

          # Garantir que o GitHub Pages não processa Jekyll
          touch public_deploy/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public_deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
